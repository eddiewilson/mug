<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anytime Booking</title>

    <!-- ======================================================
         GOOGLE ANALYTICS — GA4
         Replace G-XXXXXXXXXX with your Measurement ID
    ======================================================= -->
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ GA4_MEASUREMENT_ID }}"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', '{{ GA4_MEASUREMENT_ID }}');
    </script>

    <!-- ======================================================
         GOOGLE ANALYTICS — Legacy analytics.js (Universal Analytics)
         Replace UA-XXXXXXXX-X with your Tracking ID
         NOTE: UA properties stopped processing hits July 2023.
         Keep only if you have a legacy reporting requirement.
    ======================================================= -->
    <script>
        (function (i, s, o, g, r, a, m) {
            i['GoogleAnalyticsObject'] = r;
            i[r] = i[r] || function () {
                (i[r].q = i[r].q || []).push(arguments)
            }, i[r].l = 1 * new Date();
            a = s.createElement(o), m = s.getElementsByTagName(o)[0];
            a.async = 1;
            a.src = g;
            m.parentNode.insertBefore(a, m)
        })(window, document, 'script', 'https://www.google-analytics.com/analytics.js', 'ga');

        ga('create', '{{ UA_TRACKING_ID }}', 'auto');
        ga('send', 'pageview');
    </script>

    <!-- ======================================================
         ANYTIME BOOKING WIDGET DEPENDENCIES
    ======================================================= -->
    <script src="https://code.jquery.com/jquery-latest.min.js" type="text/javascript"></script>
    <link rel="stylesheet" type="text/css"
        href="https://staging.anytimebooking.eu/widgets/calendar_grid5/css/master.css">
    <script type="text/javascript"
        src="https://staging.anytimebooking.eu/widgets/calendar_grid5/js/multi-unit-grid.js"></script>

</head>

<body>

    <!-- Anytime Booking widget markup goes here -->
    <div style="width: 80vw; height: 80vh; display: flex; align-items: center; justify-content: center;">
        <style>
            #widget-wrapper .unit-name {
                height: 38px !important;
                line-height: 33px;
            }

            #widget-wrapper .unit-item {
                width: 260px;
                height: 38px
            }
        </style>
        <div id="widget-wrapper" data-site="0" data-category="9587" data-account="staging" style="max-width: 100%;">
            <div id="month-box">
                <strong>Month To View</strong><br>
                <select id="calendar-month">
                </select>
            </div>
            <div id="button-box">
            </div>
            <div id="calender-box">
                <div id="unit-box"></div>
                <div id="calender-content"></div>
            </div>
            <div id="loading-box">
                Loading...Please Wait
            </div>
            <div id="unit-costs"></div>
        </div>
    </div>

</body>

</html>
